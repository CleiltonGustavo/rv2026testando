<html>
  <head>
    <title>Segunda experiência de RA usando o AR.js e o A-frame. Marcador Hiro e uma imagem</title>
     <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
     <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden">
    <a-scene vr-mode-ui="enabled: false" embedded arjs="debugUIEnabled: false">
        <a-asset>
            <a-asset-item id="modelo" src="star.gltf"></a-asset-item>
        </a-asset>
        <a-marker preset="hiro">
        <a-entity id="modelo3d"
        position=""
        rotation=""
        scale=""
        gltf-model="modelo"></a-entity>
        <!-- <a-image src="https://www.pngall.com/wp-content/uploads/15/World-Cup-Trophy-PNG-Picture.png" position="0 0.5 0" rotation="-90 0 0" width="1" height="1"></a-image>  -->
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
